<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#0B1F3A">
  <title>Kern River Run — Hewett Will Do It 2026</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="gameWrapper">
    <canvas id="gameCanvas"></canvas>
  </div>

  <!-- Legend: shown in margin on wide screens, hidden on mobile -->
  <aside id="gameLegend" aria-label="Item guide">
    <p class="legend-title">ITEMS</p>

    <p class="legend-section avoid-label">AVOID</p>

    <div class="legend-row">
      <!-- Rock -->
      <svg width="26" height="26" viewBox="0 0 26 26" aria-hidden="true">
        <path d="M13,2 L23,8 L21,22 L5,22 L3,8 Z" fill="#5D6875"/>
        <path d="M7,5 L15,9 L10,13 Z" fill="#9CA3AF" opacity="0.55"/>
      </svg>
      <span>Rock</span>
    </div>

    <div class="legend-row">
      <!-- Boulder (darker, bigger) -->
      <svg width="26" height="26" viewBox="0 0 26 26" aria-hidden="true">
        <path d="M13,1 L24,7 L22,24 L4,24 L2,7 Z" fill="#7C2D12"/>
        <path d="M6,4 L15,8 L10,13 Z" fill="#A16207" opacity="0.70"/>
      </svg>
      <span>Boulder</span>
    </div>

    <div class="legend-row">
      <!-- Branch -->
      <svg width="44" height="18" viewBox="0 0 44 18" aria-hidden="true">
        <rect x="4" y="6" width="36" height="7" rx="3" fill="#92400E"/>
        <rect x="4" y="6" width="36" height="3" rx="2" fill="#B45309"/>
        <rect x="18" y="2" width="4" height="6" rx="1" fill="#78350F"/>
        <rect x="26" y="11" width="3" height="5" rx="1" fill="#78350F"/>
      </svg>
      <span>Branch</span>
    </div>

    <div class="legend-row">
      <!-- Wave -->
      <svg width="36" height="22" viewBox="0 0 36 22" aria-hidden="true">
        <rect x="2" y="4" width="32" height="16" rx="3" fill="#3B82F6" opacity="0.55"/>
        <path d="M2,14 Q8,4 14,10 Q20,16 26,8 Q32,4 36,8" stroke="#60A5FA" stroke-width="3.5" fill="none" stroke-linecap="round"/>
        <path d="M4,11 Q9,6 14,10" stroke="#EFF6FF" stroke-width="2" fill="none" opacity="0.7" stroke-linecap="round"/>
      </svg>
      <span>Wave</span>
    </div>

    <div class="legend-row">
      <!-- Roots -->
      <svg width="36" height="26" viewBox="0 0 36 26" aria-hidden="true">
        <path d="M2,12 Q8,4 16,8 Q24,4 34,12" stroke="#78350F" stroke-width="2.5" fill="none" stroke-linecap="round"/>
        <path d="M4,17 Q12,9 20,13 Q28,9 34,15" stroke="#92400E" stroke-width="2" fill="none" stroke-linecap="round"/>
        <path d="M2,22 Q10,16 18,20 Q26,14 34,20" stroke="#78350F" stroke-width="2" fill="none" stroke-linecap="round"/>
        <circle cx="8" cy="24" r="1.5" fill="#92400E"/>
        <circle cx="20" cy="24" r="1.5" fill="#78350F"/>
        <circle cx="30" cy="23" r="1.5" fill="#92400E"/>
      </svg>
      <span>Roots</span>
    </div>

    <div class="legend-row">
      <!-- Rapids -->
      <svg width="36" height="22" viewBox="0 0 36 22" aria-hidden="true">
        <rect x="2" y="2" width="32" height="18" rx="2" fill="#2563EB"/>
        <path d="M4,9 Q8,4 12,9 Q16,14 20,9 Q24,4 28,9 Q32,14 36,9" fill="#EFF6FF" opacity="0.85"/>
        <path d="M2,15 Q6,10 10,15 Q14,20 18,15 Q22,10 26,15 Q30,20 34,15" fill="#EFF6FF" opacity="0.60"/>
      </svg>
      <span>Rapids</span>
    </div>

    <div class="legend-row">
      <!-- Kayak Traffic -->
      <svg width="36" height="22" viewBox="0 0 36 22" aria-hidden="true">
        <path d="M18,2 C26,4 30,18 18,20 C6,18 10,4 18,2 Z" fill="#DC2626"/>
        <circle cx="18" cy="10" r="3.5" fill="#FBBF24"/>
        <line x1="6" y1="7" x2="30" y2="15" stroke="#78350F" stroke-width="2"/>
        <ellipse cx="6" cy="7" rx="3" ry="1.5" fill="#92400E" transform="rotate(-25 6 7)"/>
        <ellipse cx="30" cy="15" rx="3" ry="1.5" fill="#92400E" transform="rotate(-25 30 15)"/>
      </svg>
      <span>Kayak</span>
    </div>

    <div class="legend-row">
      <!-- Piling -->
      <svg width="20" height="30" viewBox="0 0 20 30" aria-hidden="true">
        <rect x="5" y="2" width="10" height="26" rx="2" fill="#44403C"/>
        <rect x="5" y="2" width="10" height="4" rx="2" fill="#57534E"/>
        <line x1="5" y1="11" x2="15" y2="11" stroke="#292524" stroke-width="1.5"/>
        <line x1="5" y1="18" x2="15" y2="18" stroke="#292524" stroke-width="1.5"/>
        <line x1="5" y1="25" x2="15" y2="25" stroke="#292524" stroke-width="1.5"/>
      </svg>
      <span>Piling</span>
    </div>

    <div class="legend-row">
      <!-- Fishing -->
      <svg width="28" height="30" viewBox="0 0 28 30" aria-hidden="true">
        <line x1="4" y1="2" x2="22" y2="8" stroke="#78350F" stroke-width="2.5" stroke-linecap="round"/>
        <path d="M22,8 Q28,16 16,24" stroke="#CBD5E1" stroke-width="1.5" fill="none"/>
        <path d="M16,22 Q14,28 18,28 Q22,28 22,24" stroke="#9CA3AF" stroke-width="2" fill="none" stroke-linecap="round"/>
      </svg>
      <span>Fishing</span>
    </div>

    <div class="legend-row">
      <!-- Cooler -->
      <svg width="34" height="24" viewBox="0 0 34 24" aria-hidden="true">
        <rect x="2" y="8" width="30" height="14" rx="2" fill="#1D4ED8"/>
        <rect x="2" y="8" width="30" height="6" rx="2" fill="#EFF6FF"/>
        <rect x="12" y="4" width="10" height="6" rx="1" fill="#3B82F6"/>
        <rect x="5" y="6" width="4" height="10" rx="1" fill="#1E40AF" opacity="0.55"/>
        <rect x="25" y="6" width="4" height="10" rx="1" fill="#1E40AF" opacity="0.55"/>
      </svg>
      <span>Cooler</span>
    </div>

    <div class="legend-row">
      <!-- Rockslide -->
      <svg width="36" height="28" viewBox="0 0 36 28" aria-hidden="true">
        <polygon points="6,22 14,10 20,22" fill="#44403C"/>
        <polygon points="16,26 26,16 32,26" fill="#3F3F46"/>
        <polygon points="2,28 10,20 14,28" fill="#57534E"/>
        <polygon points="20,18 28,8 34,18" fill="#44403C"/>
        <polygon points="10,28 18,22 22,28" fill="#292524"/>
      </svg>
      <span>Rockslide</span>
    </div>

    <div class="legend-row">
      <!-- Traffic Cone -->
      <svg width="22" height="30" viewBox="0 0 22 30" aria-hidden="true">
        <polygon points="11,2 20,28 2,28" fill="#EA580C"/>
        <rect x="4" y="17" width="14" height="3.5" rx="1" fill="#EFF6FF"/>
        <rect x="2" y="26" width="18" height="3" rx="1" fill="#C2410C"/>
      </svg>
      <span>Cone</span>
    </div>

    <div class="legend-row">
      <!-- Barrier (K-rail) -->
      <svg width="36" height="22" viewBox="0 0 36 22" aria-hidden="true">
        <rect x="2" y="8" width="32" height="12" rx="1" fill="#9CA3AF"/>
        <polygon points="2,8 8,2 28,2 34,8" fill="#D1D5DB"/>
        <polygon points="8,2 14,2 10,8 4,8" fill="#E5E7EB"/>
        <path d="M10,8 L6,20" stroke="#EF4444" stroke-width="3"/>
        <path d="M20,8 L16,20" stroke="#EF4444" stroke-width="3"/>
        <path d="M30,8 L26,20" stroke="#EF4444" stroke-width="3"/>
      </svg>
      <span>Barrier</span>
    </div>

    <div class="legend-row">
      <!-- Crack -->
      <svg width="30" height="30" viewBox="0 0 30 30" aria-hidden="true">
        <path d="M8,2 L12,10 L6,18 L14,26 L18,22" stroke="#1C1917" stroke-width="3.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M12,10 L18,8" stroke="#1C1917" stroke-width="2" fill="none" stroke-linecap="round"/>
        <path d="M6,18 L2,16" stroke="#1C1917" stroke-width="2" fill="none" stroke-linecap="round"/>
      </svg>
      <span>Crack</span>
    </div>

    <div class="legend-row">
      <!-- Tumbleweed -->
      <svg width="28" height="28" viewBox="0 0 28 28" aria-hidden="true">
        <circle cx="14" cy="14" r="10" fill="none" stroke="#92400E" stroke-width="2.5"/>
        <path d="M4,14 Q14,4 24,14 Q14,24 4,14 Z" fill="none" stroke="#78350F" stroke-width="1.5"/>
        <path d="M14,4 Q24,14 14,24 Q4,14 14,4 Z" fill="none" stroke="#78350F" stroke-width="1.5"/>
        <circle cx="14" cy="14" r="2.5" fill="#92400E"/>
      </svg>
      <span>Tumbleweed</span>
    </div>

    <div class="legend-row">
      <!-- Sandbar -->
      <svg width="38" height="18" viewBox="0 0 38 18" aria-hidden="true">
        <path d="M2,16 Q10,2 19,4 Q28,2 36,16 Z" fill="#D97706"/>
        <path d="M6,16 Q12,6 19,7 Q26,6 32,16" fill="#FBBF24" opacity="0.55"/>
        <circle cx="12" cy="11" r="1.2" fill="#B45309" opacity="0.5"/>
        <circle cx="19" cy="8" r="1.2" fill="#B45309" opacity="0.5"/>
        <circle cx="26" cy="11" r="1.2" fill="#B45309" opacity="0.5"/>
      </svg>
      <span>Sandbar</span>
    </div>

    <div class="legend-row">
      <!-- Bridge (JUMP) -->
      <svg width="32" height="20" viewBox="0 0 32 20" aria-hidden="true">
        <rect x="3" y="2" width="4" height="18" fill="#5C2D0A"/>
        <rect x="25" y="2" width="4" height="18" fill="#5C2D0A"/>
        <rect x="1" y="4" width="30" height="3" fill="#5C2D0A"/>
        <rect x="3" y="7" width="26" height="11" fill="#92400E"/>
        <rect x="3" y="7" width="26" height="3" fill="#B45309"/>
        <rect x="3" y="15" width="26" height="3" fill="#78350F"/>
      </svg>
      <span>Bridge<br><em>(JUMP!)</em></span>
    </div>

    <div class="legend-row">
      <!-- Tube / procession hint -->
      <svg width="32" height="20" viewBox="0 0 32 20" aria-hidden="true">
        <line x1="2" y1="10" x2="30" y2="10" stroke="#92400E" stroke-width="2"/>
        <circle cx="8"  cy="10" r="6" fill="none" stroke="#F97316" stroke-width="4"/>
        <circle cx="8"  cy="10" r="2" fill="#3B82F6"/>
        <circle cx="24" cy="10" r="6" fill="none" stroke="#F97316" stroke-width="4"/>
        <circle cx="24" cy="10" r="2" fill="#3B82F6"/>
      </svg>
      <span>Tubes<br><em>(JUMP!)</em></span>
    </div>

    <div class="legend-row">
      <!-- Tube Riders (tube_riders — riders on tubes, distinct from empty tube procession) -->
      <svg width="40" height="22" viewBox="0 0 40 22" aria-hidden="true">
        <circle cx="11" cy="15" r="7" fill="none" stroke="#F97316" stroke-width="3.5"/>
        <circle cx="11" cy="15" r="2.5" fill="#60A5FA"/>
        <circle cx="29" cy="15" r="7" fill="none" stroke="#F97316" stroke-width="3.5"/>
        <circle cx="29" cy="15" r="2.5" fill="#60A5FA"/>
        <circle cx="11" cy="5" r="3" fill="#FBBF24"/>
        <line x1="11" y1="8" x2="11" y2="13" stroke="#92400E" stroke-width="1.5"/>
        <line x1="6" y1="11" x2="16" y2="11" stroke="#92400E" stroke-width="1.5"/>
        <circle cx="29" cy="5" r="3" fill="#FBBF24"/>
        <line x1="29" y1="8" x2="29" y2="13" stroke="#92400E" stroke-width="1.5"/>
        <line x1="24" y1="11" x2="34" y2="11" stroke="#92400E" stroke-width="1.5"/>
      </svg>
      <span>Riders<br><em>(JUMP!)</em></span>
    </div>

    <p class="legend-section collect-label">COLLECT</p>

    <div class="legend-row">
      <!-- Water drop -->
      <svg width="22" height="28" viewBox="0 0 22 28" aria-hidden="true">
        <path d="M11,2 C16,8 19,16 11,26 C3,16 6,8 11,2 Z" fill="#38BDF8"/>
        <ellipse cx="9" cy="12" rx="2.5" ry="4" fill="#BAE6FD" opacity="0.65"/>
      </svg>
      <span>Drop<br><em>+50 pts</em></span>
    </div>

    <div class="legend-row">
      <!-- Fish -->
      <svg width="28" height="18" viewBox="0 0 28 18" aria-hidden="true">
        <ellipse cx="11" cy="9" rx="9" ry="5" fill="#34D399"/>
        <polygon points="20,9 28,4 28,14" fill="#34D399"/>
        <circle cx="5" cy="7" r="1.5" fill="#0B1F3A"/>
      </svg>
      <span>Fish<br><em>+50 pts</em></span>
    </div>

    <div class="legend-row">
      <!-- Poppy -->
      <svg width="28" height="28" viewBox="0 0 28 28" aria-hidden="true">
        <ellipse cx="14" cy="7"  rx="4" ry="7"  fill="#F97316"/>
        <ellipse cx="14" cy="21" rx="4" ry="7"  fill="#FB923C"/>
        <ellipse cx="7"  cy="14" rx="7" ry="4"  fill="#F97316"/>
        <ellipse cx="21" cy="14" rx="7" ry="4"  fill="#FB923C"/>
        <circle  cx="14" cy="14" r="4"           fill="#FBBF24"/>
        <circle  cx="14" cy="14" r="1.8"         fill="#78350F"/>
      </svg>
      <span>Poppy<br><em>+50 pts</em></span>
    </div>
  </aside>

  <script src="game.js"></script>
</body>
</html>
