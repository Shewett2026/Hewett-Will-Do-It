<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#0B1F3A">
  <title>Kern River Run — 3D Experiment</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 100%; height: 100%;
      overflow: hidden; background: #0B1F3A;
      overscroll-behavior: none; touch-action: none;
    }
    body { display: flex; justify-content: center; align-items: center; }
    #gameCanvas { display: block; max-width: 100vw; max-height: 100vh; }

    /* ── HUD ── */
    #hud3 {
      position: fixed; top: 0; left: 50%; transform: translateX(-50%);
      width: min(430px, 100vw); height: 54px;
      background: rgba(11,31,58,0.88);
      font-family: 'Press Start 2P', monospace;
      color: #F5F0E8;
      display: none;
      align-items: center; justify-content: space-between;
      padding: 0 10px; font-size: 7px;
      pointer-events: none; z-index: 10;
      flex-wrap: wrap; gap: 2px;
    }
    #hud3.visible { display: flex; }
    .hud3-row { display: flex; justify-content: space-between; width: 100%; }
    #hud3-score { color: #C9883A; }
    #hud3-best  { color: #C9883A; }

    /* ── TRANSITION MESSAGE ── */
    #transitionMsg3 {
      position: fixed; left: 50%; transform: translateX(-50%);
      top: 55%; width: min(430px, 100vw);
      text-align: center; font-family: 'Press Start 2P', monospace;
      font-size: 8px; color: #C9883A;
      background: rgba(11,31,58,0.90);
      padding: 10px 0; opacity: 0;
      pointer-events: none; z-index: 15;
      transition: opacity 0.1s;
    }

    /* ── OVERLAY ── */
    #overlay3 {
      position: fixed; inset: 0;
      background: rgba(11,31,58,0.94);
      z-index: 20; display: flex;
      align-items: center; justify-content: center;
    }
    #overlay3.hidden { display: none; }
    .screen3 { display: none; flex-direction: column; align-items: center; gap: 18px;
      font-family: 'Press Start 2P', monospace; color: #F5F0E8;
      width: min(360px, 90vw); text-align: center; }
    .screen3.visible { display: flex; }

    .screen3 h1 { font-size: clamp(14px,4vw,22px); color: #C9883A; line-height: 1.4; }
    .screen3 p  { font-size: 7px; color: #93C5FD; line-height: 1.7; }
    .screen3 .sub { font-size: 6px; color: #9CA3AF; }

    .btn3 {
      font-family: 'Press Start 2P', monospace;
      font-size: 9px; color: #F5F0E8;
      background: #2D6A4F; border: 2px solid #F5F0E8;
      padding: 12px 28px; cursor: pointer; width: 100%;
      max-width: 280px; text-align: center;
    }
    .btn3:hover { background: #3D8A6F; }
    .btn3.secondary { background: #1E3A5F; color: #C9883A; border-color: #C9883A; }
    .btn3.secondary:hover { background: #2E4A6F; }

    .screen3 .go-score { font-size: 10px; color: #C9883A; }
    .screen3 .go-best  { font-size: 10px; color: #93C5FD; }

    .exp-badge {
      font-size: 5px; color: #F97316;
      border: 1px solid #F97316; padding: 4px 8px;
    }
  </style>
</head>
<body>
  <canvas id="gameCanvas"></canvas>

  <!-- HUD -->
  <div id="hud3">
    <div class="hud3-row">
      <span id="hud3-stage">HEADWATERS</span>
      <span id="hud3-mile">MILE 0 / 165</span>
      <span id="hud3-stageNum">STAGE 1/5</span>
    </div>
    <div class="hud3-row">
      <span id="hud3-score">SCORE 0</span>
      <span id="hud3-best">BEST 0</span>
    </div>
  </div>

  <!-- Stage transition flash -->
  <div id="transitionMsg3"></div>

  <!-- Screens overlay -->
  <div id="overlay3">

    <!-- Start screen -->
    <div id="screen3-start" class="screen3 visible">
      <div class="exp-badge">3D EXPERIMENT</div>
      <h1>KERN RIVER RUN</h1>
      <p>Three.js chase camera<br>+ low-poly kayaker</p>
      <p class="sub">Arrow keys / WASD + Space<br>Swipe + tap on mobile</p>
      <button class="btn3" id="btn3-start">START RUN</button>
      <p class="sub" style="font-size:5px;color:#4B5563">
        Isolated experiment — does not affect the main game
      </p>
    </div>

    <!-- Game over screen -->
    <div id="screen3-gameover" class="screen3">
      <h1 class="go-title3">RUN ENDED</h1>
      <p class="go-stage3">Stage: HEADWATERS</p>
      <p class="go-mile3">Mile 0 / 165</p>
      <p class="go-score3 go-score">SCORE 0</p>
      <p class="go-best3 go-best">BEST 0</p>
      <button class="btn3" id="btn3-retry">TRY AGAIN</button>
      <button class="btn3 secondary" id="btn3-menu">MAIN MENU</button>
    </div>

    <!-- Paused screen -->
    <div id="screen3-paused" class="screen3">
      <h1>PAUSED</h1>
      <button class="btn3" id="btn3-resume">RESUME</button>
      <button class="btn3 secondary" id="btn3-quit">QUIT RUN</button>
    </div>

  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
  <script src="game-3d-experiment.js"></script>
</body>
</html>
